<style>
:root{
--bg:#070707;
--panel:#141414;
--panel-border:#2a2a2a;
--red:#d60000;
--red-hot:#ff2424;
--text:#ffffff;
--muted:#b8b8b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
background:
linear-gradient(180deg,rgba(0,0,0,.54),var(--bg) 44%,#050505 100%),
radial-gradient(circle at 50% 0%,rgba(214,0,0,.32),transparent 38%),
url("https://images.unsplash.com/photo-1508973379184-7517410fb0bc?auto=format&fit=crop&w=1600&q=80");
background-color:var(--bg);
background-size:cover;
background-position:center top;
background-attachment:fixed;
font-family:Inter,Arial,sans-serif;
color:var(--text);
}

a{
color:inherit;
}

.page{
width:min(100%,760px);
margin:0 auto;
padding:34px 18px 44px;
}

.hero{
text-align:center;
padding:8px 0 18px;
}

.hero img{
display:block;
width:min(100%,430px);
height:auto;
margin:0 auto 18px;
filter:drop-shadow(0 0 30px rgba(214,0,0,.42));
}

.tagline{
font-family:Oswald,Arial,sans-serif;
font-size:clamp(17px,4.2vw,24px);
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
color:#f2f2f2;
}

.subtag{
margin-top:8px;
color:var(--muted);
font-weight:500;
}

.section{
margin-top:24px;
padding:18px;
background:rgba(20,20,20,.82);
border:1px solid var(--panel-border);
border-radius:8px;
backdrop-filter:blur(8px);
box-shadow:0 18px 48px rgba(0,0,0,.34);
}

.section h2{
font-family:Oswald,Arial,sans-serif;
font-size:22px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:14px;
}

.links{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
min-height:58px;
padding:16px 18px;
border:1px solid rgba(255,255,255,.08);
border-radius:8px;
background:linear-gradient(180deg,var(--red),#a90000);
color:white;
text-decoration:none;
font-size:17px;
font-weight:800;
transition:transform .2s ease,background .2s ease,border-color .2s ease;
}

.btn:hover{
transform:translateY(-2px);
background:linear-gradient(180deg,var(--red-hot),#c40000);
border-color:rgba(255,255,255,.18);
}

.brand-icon{
width:26px;
height:26px;
flex:0 0 26px;
display:block;
object-fit:contain;
color:white;
}

.icon-emoji{
width:28px;
height:26px;
flex:0 0 28px;
display:inline-flex;
align-items:center;
justify-content:center;
font-size:23px;
line-height:1;
}

.footer{
margin-top:28px;
text-align:center;
font-size:13px;
font-weight:600;
letter-spacing:1px;
color:#8d8d8d;
}

@media (min-width:680px){
.links{
grid-template-columns:1fr 1fr;
}

.section:last-of-type .links{
grid-template-columns:1fr;
}
}
</style>
</head>
